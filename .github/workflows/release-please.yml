name: release-please

on:
  push:
    branches: [main]

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created == 'true' || steps.release_after_merge.outputs.release_created == 'true' }}
      tag_name: ${{ steps.release_after_merge.outputs.tag_name || steps.release.outputs.tag_name }}
      version: ${{ steps.release_after_merge.outputs.version || steps.release.outputs.version }}
      major_minor: ${{ steps.release_after_merge.outputs.major || steps.release.outputs.major }}.${{ steps.release_after_merge.outputs.minor || steps.release.outputs.minor }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Find release pull request
        id: release_pr
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail

          branch_prefix="release-please--branches--${GITHUB_REF_NAME}"
          pr_number="$(
            jq -r \
              --arg base "${GITHUB_REF_NAME}" \
              --arg branch_prefix "${branch_prefix}" \
              '.[] | select(.baseBranchName == $base and (.headBranchName | startswith($branch_prefix))) | .number' \
              <<< "${RELEASE_PRS:-[]}" |
            head -n 1
          )"

          if [[ -z "${pr_number}" ]]; then
            for attempt in 1 2 3 4 5 6; do
              pr_number="$(
                gh pr list \
                  --repo "${GITHUB_REPOSITORY}" \
                  --state open \
                  --base "${GITHUB_REF_NAME}" \
                  --label "autorelease: pending" \
                  --json number,headRefName \
                  --jq ".[] | select(.headRefName | startswith(\"${branch_prefix}\")) | .number" |
                head -n 1
              )"

              [[ -n "${pr_number}" ]] && break
              echo "release PR not found on attempt ${attempt}, retrying"
              sleep 5
            done
          fi

          echo "number=${pr_number}" >> "${GITHUB_OUTPUT}"

      - name: Merge release pull request
        if: ${{ steps.release_pr.outputs.number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.release_pr.outputs.number }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --squash --delete-branch; then
              exit 0
            fi

            echo "release PR merge attempt ${attempt} failed, retrying"
            sleep 10
          done

          exit 1

      # GITHUB_TOKEN merges do not trigger a follow-up push workflow, so create
      # the release in this same run after the generated PR lands.
      - name: Create release after automated merge
        id: release_after_merge
        if: ${{ steps.release_pr.outputs.number != '' }}
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v7
        with:
          node-version: 24.14.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Publish to npmjs
        run: npm publish --provenance --access public

  docker:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ghcr.io/icoretech/warden-mcp
          labels: |
            org.opencontainers.image.description=MCP server for Vaultwarden/Bitwarden vault management
            org.opencontainers.image.source=https://github.com/icoretech/warden-mcp
            org.opencontainers.image.title=Warden MCP
            org.opencontainers.image.vendor=iCoreTech, Inc.
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major_minor }}
            type=raw,value=latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          provenance: mode=max
