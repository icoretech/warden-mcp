name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check .

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test "dist/**/*.test.js"

      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
