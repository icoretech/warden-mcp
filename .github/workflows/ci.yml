name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check .

      - name: Build
        run: npm run build

      - name: Unit tests
        run: node --test "dist/**/*.test.js"

      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  integration-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: run docker-compose integration smoke
        run: |
          docker compose up -d vaultwarden vaultwarden-https
          docker compose run --rm bootstrap
          docker compose run --rm tests
          docker compose run --rm tests-apikey

      - name: dump compose logs
        if: always()
        run: docker compose logs --no-color || true

      - name: tear down compose stack
        if: always()
        run: docker compose down -v --remove-orphans
